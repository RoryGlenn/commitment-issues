<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='980' viewBox='0 0 1200 980' role='img' aria-labelledby='title desc'>
  <title id='title'>commitment-issues project flowchart</title>
  <desc id='desc'>A dark theme flowchart showing setup, Git hook wiring, pre-commit checks, safe fix paths, and pre-push checks.</desc>
  <style>
    .bg { fill: #0d1117; }
    .header { fill: #151b23; stroke: #30363d; stroke-width: 2; }
    .panel { fill: #111820; stroke-width: 2; }
    .card { fill: #1b222c; stroke: #3b4656; stroke-width: 1.5; }
    .diamond { stroke-width: 1.5; }
    .title { fill: #f0f6fc; font: 700 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #8bbdff; font: italic 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .section { font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #f0f6fc; font: 700 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .small { fill: #c9d1d9; font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono { fill: #f0f6fc; font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
    .muted { fill: #8b949e; font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .green { stroke: #3fb950; }
    .blue { stroke: #2f81f7; }
    .purple { stroke: #a371f7; }
    .orange { stroke: #f7812f; }
    .cyan { stroke: #39c5cf; }
    .greenText { fill: #7ee787; }
    .blueText { fill: #58a6ff; }
    .purpleText { fill: #d2a8ff; }
    .orangeText { fill: #ffab70; }
    .cyanText { fill: #56d4dd; }
    .warn { fill: #f2cc60; }
    .danger { fill: #ff7b72; }
    .arrow { stroke: #8b949e; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .arrowGreen { stroke: #3fb950; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
    .num { fill: #ffffff; font: 800 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .footer { fill: #161b22; stroke: #30363d; stroke-width: 2; }
  </style>
  <defs>
    <marker id='arrow' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M2 2 L10 6 L2 10 Z' fill='#8b949e' /></marker>
    <marker id='arrowGreen' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M2 2 L10 6 L2 10 Z' fill='#3fb950' /></marker>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'><feDropShadow dx='0' dy='6' stdDeviation='6' flood-color='#000000' flood-opacity='0.45' /></filter>
  </defs>

  <rect class='bg' width='1200' height='980' rx='24' />
  <rect class='header' x='190' y='18' width='820' height='74' rx='20' filter='url(#shadow)' />
  <text class='title' x='600' y='55' text-anchor='middle'>commitment-issues — Project Flowchart</text>
  <text class='subtitle' x='600' y='80' text-anchor='middle'>Advisory-first Git hooks for developers who overthink every commit</text>

  <g transform='translate(24 116)'>
    <rect class='panel green' width='536' height='190' rx='16' />
    <rect x='18' y='18' width='38' height='38' rx='9' fill='#238636' />
    <text class='num' x='37' y='45' text-anchor='middle'>1</text>
    <text class='section greenText' x='70' y='44'>Setup</text>
    <rect class='card' x='24' y='76' width='150' height='84' rx='12' />
    <text class='label' x='99' y='102' text-anchor='middle'>Install tools</text>
    <text class='mono' x='99' y='126' text-anchor='middle'>npm install -D</text>
    <text class='mono' x='99' y='144' text-anchor='middle'>commitment-issues</text>
    <text class='mono' x='99' y='162' text-anchor='middle'>eslint prettier</text>
    <path class='arrowGreen' d='M188 118 H220' />
    <rect class='card' x='232' y='76' width='150' height='84' rx='12' />
    <text class='label' x='307' y='108' text-anchor='middle'>Run init</text>
    <text class='mono' x='307' y='132' text-anchor='middle'>npx</text>
    <text class='mono' x='307' y='150' text-anchor='middle'>commitment-issues init</text>
    <path class='arrowGreen' d='M396 118 H426' />
    <rect class='card' x='438' y='58' width='74' height='120' rx='12' />
    <text class='label' x='475' y='89' text-anchor='middle'>Wire</text>
    <text class='label' x='475' y='109' text-anchor='middle'>hooks</text>
    <text class='small' x='475' y='136' text-anchor='middle'>scripts</text>
    <text class='small' x='475' y='154' text-anchor='middle'>.git/hooks</text>
    <text class='small' x='475' y='172' text-anchor='middle'>defaults</text>
  </g>

  <g transform='translate(586 116)'>
    <rect class='panel blue' width='590' height='190' rx='16' />
    <rect x='18' y='18' width='38' height='38' rx='9' fill='#1f6feb' />
    <text class='num' x='37' y='45' text-anchor='middle'>2</text>
    <text class='section blueText' x='70' y='44'>Core Hook Wiring</text>
    <rect class='card' x='24' y='76' width='130' height='46' rx='10' />
    <text class='label' x='89' y='105' text-anchor='middle'>git commit</text>
    <path class='arrow' d='M166 99 H214' />
    <rect class='card' x='226' y='76' width='136' height='46' rx='10' />
    <text class='mono' x='294' y='96' text-anchor='middle'>.git/hooks/</text>
    <text class='mono' x='294' y='114' text-anchor='middle'>pre-commit</text>
    <path class='arrow' d='M374 99 H422' />
    <rect class='card' x='434' y='76' width='132' height='46' rx='10' />
    <text class='mono' x='500' y='96' text-anchor='middle'>commitment-issues</text>
    <text class='mono' x='500' y='114' text-anchor='middle'>precommit</text>
    <rect class='card' x='24' y='134' width='130' height='46' rx='10' />
    <text class='label' x='89' y='163' text-anchor='middle'>git push</text>
    <path class='arrow' d='M166 157 H214' />
    <rect class='card' x='226' y='134' width='136' height='46' rx='10' />
    <text class='mono' x='294' y='154' text-anchor='middle'>.git/hooks/</text>
    <text class='mono' x='294' y='172' text-anchor='middle'>pre-push</text>
    <path class='arrow' d='M374 157 H422' />
    <rect class='card' x='434' y='134' width='132' height='46' rx='10' />
    <text class='mono' x='500' y='154' text-anchor='middle'>commitment-issues</text>
    <text class='mono' x='500' y='172' text-anchor='middle'>prepush</text>
  </g>

  <g transform='translate(24 330)'>
    <rect class='panel purple' width='720' height='360' rx='16' />
    <rect x='18' y='18' width='38' height='38' rx='9' fill='#8957e5' />
    <text class='num' x='37' y='45' text-anchor='middle'>3</text>
    <text class='section purpleText' x='70' y='44'>Pre-commit flow</text>
    <rect class='card' x='30' y='95' width='125' height='56' rx='10' />
    <text class='label' x='92' y='118' text-anchor='middle'>Stage files</text>
    <text class='small' x='92' y='138' text-anchor='middle'>then git commit</text>
    <path class='arrow' d='M170 123 H198' />
    <rect class='card' x='210' y='95' width='135' height='56' rx='10' />
    <text class='label' x='277' y='118' text-anchor='middle'>Inspect</text>
    <text class='small' x='277' y='138' text-anchor='middle'>staged files</text>
    <path class='arrow' d='M360 123 H386' />
    <path class='diamond' d='M405 76 L480 123 L405 170 L330 123 Z' fill='#21172c' stroke='#a371f7' />
    <text class='small' x='405' y='118' text-anchor='middle'>Relevant</text>
    <text class='small' x='405' y='136' text-anchor='middle'>project files?</text>
    <text class='muted' x='508' y='115' text-anchor='middle'>No</text>
    <path class='arrow' d='M480 123 H543' />
    <rect class='card' x='555' y='95' width='130' height='56' rx='10' />
    <text class='greenText' x='620' y='118' text-anchor='middle' font-size='22' font-weight='800'>✓</text>
    <text class='small' x='620' y='139' text-anchor='middle'>Allow commit</text>
    <text class='muted' x='422' y='191' text-anchor='middle'>Yes</text>
    <path class='arrow' d='M405 170 V212 H335' />
    <rect class='card' x='225' y='230' width='220' height='60' rx='10' />
    <text class='label' x='335' y='254' text-anchor='middle'>Run checks</text>
    <text class='small' x='335' y='274' text-anchor='middle'>lint, format, missing tests</text>
    <path class='arrow' d='M458 260 H464' />
    <path class='diamond' d='M545 215 L615 260 L545 305 L475 260 Z' fill='#21172c' stroke='#a371f7' />
    <text class='small' x='545' y='254' text-anchor='middle'>Issues</text>
    <text class='small' x='545' y='272' text-anchor='middle'>found?</text>
    <text class='muted' x='626' y='252' text-anchor='middle'>No</text>
    <path class='arrow' d='M615 260 H626' />
    <rect class='card' x='638' y='232' width='54' height='56' rx='10' />
    <text class='greenText' x='665' y='268' text-anchor='middle' font-size='24' font-weight='800'>✓</text>
    <text class='muted' x='560' y='323' text-anchor='middle'>Yes</text>
    <path class='arrow' d='M545 305 V322 H418' />
    <rect class='card orange' x='260' y='304' width='150' height='42' rx='10' />
    <text class='warn' x='335' y='324' text-anchor='middle' font-size='18' font-weight='800'>!</text>
    <text class='small' x='335' y='340' text-anchor='middle'>Advisory warning</text>
  </g>

  <g transform='translate(768 330)'>
    <rect class='panel orange' width='408' height='360' rx='16' />
    <rect x='18' y='18' width='38' height='38' rx='9' fill='#f7812f' />
    <text class='num' x='37' y='45' text-anchor='middle'>4</text>
    <text class='section orangeText' x='70' y='44'>Safe Fix Paths</text>
    <rect class='card' x='30' y='92' width='160' height='120' rx='12' />
    <text class='label' x='110' y='126' text-anchor='middle'>npm run fix:staged</text>
    <text class='small' x='110' y='154' text-anchor='middle'>targets staged files</text>
    <text class='small' x='110' y='176' text-anchor='middle'>refuses partial staging</text>
    <text class='small' x='110' y='198' text-anchor='middle'>re-stages safe fixes</text>
    <rect class='card' x='218' y='92' width='160' height='120' rx='12' />
    <text class='label' x='298' y='126' text-anchor='middle'>npm run commit:fix</text>
    <text class='small' x='298' y='154' text-anchor='middle'>latest unpushed commit</text>
    <text class='small' x='298' y='176' text-anchor='middle'>requires clean tree</text>
    <text class='small' x='298' y='198' text-anchor='middle'>amends safely</text>
    <rect class='card orange' x='30' y='276' width='348' height='36' rx='10' />
    <text class='orangeText' x='204' y='299' text-anchor='middle' font-size='14' font-weight='700'>Refuses unsafe mutations</text>
  </g>

  <g transform='translate(24 720)'>
    <rect class='panel cyan' width='1152' height='190' rx='16' />
    <rect x='18' y='18' width='38' height='38' rx='9' fill='#1f9aaa' />
    <text class='num' x='37' y='45' text-anchor='middle'>5</text>
    <text class='section cyanText' x='70' y='44'>Pre-push flow</text>
    <rect class='card' x='34' y='92' width='120' height='50' rx='10' />
    <text class='label' x='94' y='123' text-anchor='middle'>git push</text>
    <path class='arrow' d='M168 117 H216' />
    <rect class='card' x='228' y='92' width='148' height='50' rx='10' />
    <text class='label' x='302' y='112' text-anchor='middle'>Read pushed refs</text>
    <text class='small' x='302' y='132' text-anchor='middle'>changed files</text>
    <path class='arrow' d='M390 117 H438' />
    <rect class='card' x='450' y='92' width='150' height='50' rx='10' />
    <text class='label' x='525' y='112' text-anchor='middle'>Collect related</text>
    <text class='small' x='525' y='132' text-anchor='middle'>tests</text>
    <path class='arrow' d='M614 117 H662' />
    <rect class='card' x='674' y='92' width='135' height='50' rx='10' />
    <text class='label' x='741' y='112' text-anchor='middle'>Run tests</text>
    <text class='mono' x='741' y='132' text-anchor='middle'>node --test</text>
    <path class='arrow' d='M823 117 H852' />
    <path class='diamond' d='M895 76 L948 117 L895 158 L842 117 Z' fill='#0c2530' stroke='#39c5cf' />
    <text class='small' x='895' y='112' text-anchor='middle'>Test</text>
    <text class='small' x='895' y='130' text-anchor='middle'>results</text>
    <text class='muted' x='970' y='75' text-anchor='middle'>pass</text>
    <path class='arrowGreen' d='M948 88 H986' />
    <rect class='card green' x='998' y='66' width='132' height='34' rx='10' />
    <text class='greenText' x='1064' y='88' text-anchor='middle' font-size='13' font-weight='700'>Push allowed</text>
    <text class='muted' x='976' y='112' text-anchor='middle'>fail + warn</text>
    <path class='arrow' d='M948 117 H986' />
    <rect class='card orange' x='998' y='106' width='132' height='34' rx='10' />
    <text class='warn' x='1064' y='128' text-anchor='middle' font-size='13' font-weight='700'>Advisory warning</text>
    <text class='muted' x='976' y='150' text-anchor='middle'>fail + block</text>
    <path d='M948 146 H986' stroke='#ff7b72' stroke-width='2.5' fill='none' marker-end='url(#arrow)' />
    <rect class='card' x='998' y='146' width='132' height='34' rx='10' stroke='#ff7b72' />
    <text class='danger' x='1064' y='168' text-anchor='middle' font-size='13' font-weight='700'>Push blocked</text>
  </g>

  <rect class='footer' x='24' y='930' width='1152' height='36' rx='12' />
  <text class='label' x='86' y='953'>Core idea:</text>
  <text class='small' x='172' y='953'>Own the Git hook workflow directly, stay advisory-first by default, and only block or mutate when it is safe or explicitly configured.</text>
</svg>
