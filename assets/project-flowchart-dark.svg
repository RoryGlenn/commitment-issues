<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="848" viewBox="0 0 1024 848" role="img" aria-labelledby="title desc">
  <title id="title">commitment-issues project flowchart</title>
  <desc id="desc">Project flowchart showing setup, core Git hook wiring, code and guard checks before commit, safe fix paths, and pre-push tests with advisory and blocking outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060b13"/>
      <stop offset="1" stop-color="#04070d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="aGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1.5 1.5L8.5 5L1.5 8.5Z" fill="#8b949e"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1.5 1.5L8.5 5L1.5 8.5Z" fill="#3fb950"/>
    </marker>
    <marker id="aOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1.5 1.5L8.5 5L1.5 8.5Z" fill="#f0883e"/>
    </marker>
    <marker id="aRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1.5 1.5L8.5 5L1.5 8.5Z" fill="#f85149"/>
    </marker>
  </defs>
  <style>
    .h1{font:700 27px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#f0f4f8;letter-spacing:-0.5px}
    .sub{font:italic 600 14px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#7fb3f7}
    .sec{font:700 16px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .badge{font:700 17px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#fff}
    .hd{font:700 11.5px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#e8edf3}
    .hdSm{font:700 10.5px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#e8edf3}
    .bd{font:500 10px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#c3ccd7}
    .lbl{font:700 10px ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;fill:#dbe3ec}
    .mono{font:500 9.5px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#dbe3ec}
    .monoSm{font:500 8.6px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#dbe3ec}
    .panel{fill:#080d15;stroke-width:1.6;filter:url(#shadow)}
    .card{fill:#0e141d;stroke:#3d4756;stroke-width:1.2}
    .arrow{stroke:#8b949e;stroke-width:2.2;fill:none;marker-end:url(#aGray)}
    .arrowGreen{stroke:#3fb950;stroke-width:2.2;fill:none;marker-end:url(#aGreen)}
    .arrowOrange{stroke:#f0883e;stroke-width:2.2;fill:none;stroke-linejoin:round;marker-end:url(#aOrange)}
    .arrowRed{stroke:#f85149;stroke-width:2.2;fill:none;stroke-linejoin:round;marker-end:url(#aRed)}
    .elbowGreen{stroke:#3fb950;stroke-width:2.2;fill:none;stroke-linejoin:round;marker-end:url(#aGreen)}
    .green{stroke:#3fb950}.blue{stroke:#2f81f7}.purple{stroke:#a371f7}.orange{stroke:#f0883e}.cyan{stroke:#29c4dd}.red{stroke:#f85149}
    .greenText{fill:#56d364}.blueText{fill:#58a6ff}.purpleText{fill:#c297ff}.orangeText{fill:#ffa657}.cyanText{fill:#56d4e8}.redText{fill:#ff7b72}.warnText{fill:#ffb224}
    .icon{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  </style>

  <rect width="1024" height="848" fill="url(#bg)"/>

  <!-- Title -->
  <rect x="160" y="8" width="704" height="68" rx="10" fill="#0f151e" stroke="#2c3644" stroke-width="1.4" filter="url(#shadow)"/>
  <text class="h1" x="512" y="42" text-anchor="middle">commitment-issues — Project Flowchart</text>
  <text class="sub" x="512" y="64" text-anchor="middle">Advisory-first Git hooks for developers who overthink every commit</text>

  <!-- 1 Setup -->
  <g transform="translate(20 90)">
    <rect class="panel green" width="478" height="166" rx="12"/>
    <rect x="16" y="14" width="30" height="30" rx="7" fill="#238636"/>
    <text class="badge" x="31" y="35" text-anchor="middle">1</text>
    <text class="sec greenText" x="58" y="35">Setup</text>

    <g transform="translate(16 52)">
      <rect class="card" width="142" height="102" rx="8"/>
      <circle class="icon" cx="17" cy="21" r="11" stroke="#4ade80"/>
      <path class="icon" stroke="#4ade80" d="M17 15v10M12.5 21l4.5 4.5L21.5 21"/>
      <text class="hd" x="34" y="25">Install tools</text>
      <text class="mono" x="12" y="54">npm install -D</text>
      <text class="mono" x="12" y="70">commitment-issues</text>
      <text class="mono" x="12" y="86">eslint prettier</text>
    </g>
    <path class="arrowGreen" d="M162 103h16"/>
    <g transform="translate(182 52)">
      <rect class="card" width="144" height="102" rx="8"/>
      <circle class="icon" cx="17" cy="21" r="11" stroke="#4ade80"/>
      <path class="icon" stroke="#4ade80" d="M14 16.5l5.5 4.5-5.5 4.5"/>
      <text class="hd" x="34" y="25">Run init</text>
      <text class="mono" x="12" y="54">npx</text>
      <text class="monoSm" x="12" y="70">commitment-issues init</text>
    </g>
    <path class="arrowGreen" d="M330 103h16"/>
    <g transform="translate(350 52)">
      <rect class="card" width="112" height="102" rx="8"/>
      <path class="icon" stroke="#4ade80" d="M13.5 11h7v6.5H27v7h-6.5V31h-7v-6.5H7v-7h6.5z"/>
      <text class="hd" x="32" y="25">Wire hooks</text>
      <text class="mono" x="12" y="54">scripts</text>
      <text class="mono" x="12" y="70">.git/hooks</text>
      <text class="mono" x="12" y="86">defaults</text>
    </g>
  </g>

  <!-- 2 Core Hook Wiring -->
  <g transform="translate(512 90)">
    <rect class="panel blue" width="492" height="166" rx="12"/>
    <rect x="16" y="14" width="30" height="30" rx="7" fill="#1f6feb"/>
    <text class="badge" x="31" y="35" text-anchor="middle">2</text>
    <text class="sec blueText" x="58" y="35">Core Hook Wiring</text>

    <g transform="translate(16 52)">
      <rect class="card" width="118" height="44" rx="8"/>
      <circle cx="15" cy="13" r="2.6" fill="none" stroke="#58a6ff" stroke-width="1.8"/>
      <circle cx="15" cy="31" r="2.6" fill="none" stroke="#58a6ff" stroke-width="1.8"/>
      <circle cx="27" cy="16" r="2.6" fill="none" stroke="#58a6ff" stroke-width="1.8"/>
      <path class="icon" stroke="#58a6ff" d="M15 16v12M27 19c0 6-12 4-12 8"/>
      <text class="hd" x="38" y="26">git commit</text>
    </g>
    <path class="arrow" d="M140 74h18"/>
    <g transform="translate(164 52)">
      <rect class="card" width="128" height="44" rx="8"/>
      <path class="icon" stroke="#9aa4b2" d="M10 14h9l3 4h12v13H10z"/>
      <text class="mono" x="40" y="19">.git/hooks/</text>
      <text class="mono" x="40" y="33">pre-commit</text>
    </g>
    <path class="arrow" d="M298 74h18"/>
    <g transform="translate(322 52)">
      <rect class="card" width="154" height="44" rx="8"/>
      <circle class="icon" cx="18" cy="22" r="10" stroke="#58a6ff"/>
      <path class="icon" stroke="#58a6ff" d="M13.5 22l3.5 3.5 6.5-8"/>
      <text class="mono" x="36" y="19">commitment-issues</text>
      <text class="mono" x="36" y="33">precommit</text>
    </g>

    <g transform="translate(16 106)">
      <rect class="card" width="118" height="44" rx="8"/>
      <path class="icon" stroke="#58a6ff" d="M17 31V13M10 20l7-7 7 7"/>
      <text class="hd" x="38" y="26">git push</text>
    </g>
    <path class="arrow" d="M140 128h18"/>
    <g transform="translate(164 106)">
      <rect class="card" width="128" height="44" rx="8"/>
      <path class="icon" stroke="#9aa4b2" d="M10 14h9l3 4h12v13H10z"/>
      <text class="mono" x="40" y="19">.git/hooks/</text>
      <text class="mono" x="40" y="33">pre-push</text>
    </g>
    <path class="arrow" d="M298 128h18"/>
    <g transform="translate(322 106)">
      <rect class="card" width="154" height="44" rx="8"/>
      <circle class="icon" cx="18" cy="22" r="10" stroke="#58a6ff"/>
      <path class="icon" stroke="#58a6ff" d="M13.5 22l3.5 3.5 6.5-8"/>
      <text class="mono" x="36" y="19">commitment-issues</text>
      <text class="mono" x="36" y="33">prepush</text>
    </g>
  </g>

  <!-- 3 Pre-commit flow -->
  <g transform="translate(20 270)">
    <rect class="panel purple" width="565" height="352" rx="12"/>
    <rect x="16" y="14" width="30" height="30" rx="7" fill="#8957e5"/>
    <text class="badge" x="31" y="35" text-anchor="middle">3</text>
    <text class="sec purpleText" x="58" y="35">Pre-commit flow</text>

    <g transform="translate(16 52)">
      <rect class="card" width="116" height="46" rx="8"/>
      <path class="icon" stroke="#9aa4b2" d="M11 12h9l5 5v17H11zM20 12v5h5"/>
      <text class="hd" x="32" y="21">Stage files</text>
      <text class="bd" x="32" y="36">then git commit</text>
    </g>
    <path class="arrow" d="M138 75h14"/>
    <g transform="translate(158 52)">
      <rect class="card" width="100" height="46" rx="8"/>
      <circle class="icon" cx="16" cy="20" r="7" stroke="#9aa4b2"/>
      <path class="icon" stroke="#9aa4b2" d="M21 25l7 7"/>
      <text class="hd" x="34" y="21">Inspect</text>
      <text class="bd" x="34" y="36">staged files</text>
    </g>
    <path class="arrow" d="M264 75h14"/>
    <path d="M336 35L388 75L336 115L284 75Z" fill="#170f26" stroke="#a371f7" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="bd" x="336" y="71" text-anchor="middle">Relevant</text>
    <text class="bd" x="336" y="85" text-anchor="middle">project files?</text>
    <text class="lbl" x="398" y="65" text-anchor="middle">No</text>
    <path class="arrow" d="M388 75h20"/>
    <g transform="translate(414 52)">
      <rect class="card green" width="134" height="46" rx="8"/>
      <path class="icon" stroke="#56d364" d="M18 10l9 3.5v7c0 7-5.5 10.5-9 12-3.5-1.5-9-5-9-12v-7z"/>
      <path class="icon" stroke="#56d364" d="M13.5 21l3.5 3.5 6-7.5"/>
      <text class="hdSm" x="34" y="21">No relevant files</text>
      <text class="bd" x="34" y="36">allow commit</text>
    </g>
    <text class="lbl" x="328" y="130" text-anchor="end">Yes</text>
    <path class="arrow" d="M336 115v12"/>
    <g transform="translate(246 133)">
      <rect class="card" width="180" height="54" rx="8"/>
      <rect class="icon" x="13" y="14" width="16" height="26" rx="2" stroke="#9aa4b2"/>
      <path class="icon" stroke="#9aa4b2" d="M17 14v-3h8v3M17 23h8M17 30h8"/>
      <text class="hd" x="40" y="22">Code checks</text>
      <text class="monoSm" x="40" y="39">lint • format • tests</text>
    </g>
    <path class="arrow" d="M336 187v10"/>
    <g transform="translate(180 203)">
      <rect class="card" width="312" height="64" rx="8"/>
      <path class="icon" stroke="#a371f7" d="M20 12l10 4v8c0 8-6 12-10 14-4-2-10-6-10-14v-8z"/>
      <path class="icon" stroke="#a371f7" d="M15.5 24l3.5 3.5 6-7.5"/>
      <text class="hd" x="42" y="20">Guard checks</text>
      <text class="monoSm" x="42" y="37">branch • upstream • secrets</text>
      <text class="monoSm" x="42" y="52">commit shape • large/generated files</text>
    </g>
    <path class="arrow" d="M336 267v10"/>
    <path d="M336 279L388 311L336 343L284 311Z" fill="#170f26" stroke="#a371f7" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="bd" x="336" y="308" text-anchor="middle">Issues</text>
    <text class="bd" x="336" y="322" text-anchor="middle">found?</text>
    <text class="lbl" x="400" y="301" text-anchor="middle">No</text>
    <path class="arrow" d="M388 311h16"/>
    <g transform="translate(408 288)">
      <rect class="card green" width="140" height="46" rx="8"/>
      <circle class="icon" cx="18" cy="23" r="10" stroke="#56d364"/>
      <path class="icon" stroke="#56d364" d="M13.5 23l3.5 3.5 6.5-8"/>
      <text class="hdSm" x="34" y="21">All checks passed</text>
      <text class="bd" x="34" y="36">allow commit</text>
    </g>
    <text class="lbl" x="240" y="301" text-anchor="middle">Yes</text>
    <path class="arrow" d="M284 311H180"/>
    <g transform="translate(16 288)">
      <rect class="card orange" width="158" height="46" rx="8"/>
      <path class="icon" stroke="#ffb224" d="M20 11l10.5 18H9.5zM20 18v6"/>
      <circle cx="20" cy="26.5" r="1.2" fill="#ffb224"/>
      <text class="warnText" x="40" y="27" font-weight="700" font-size="11" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Warn, allow commit</text>
    </g>
  </g>

  <!-- 4 Safe Fix Paths -->
  <g transform="translate(597 270)">
    <rect class="panel orange" width="407" height="352" rx="12"/>
    <rect x="16" y="14" width="30" height="30" rx="7" fill="#ee7211"/>
    <text class="badge" x="31" y="35" text-anchor="middle">4</text>
    <text class="sec orangeText" x="58" y="35">Safe Fix Paths</text>

    <g transform="translate(16 76)">
      <rect class="card orange" width="182" height="152" rx="10"/>
      <circle class="icon" cx="91" cy="30" r="16" stroke="#f0883e"/>
      <path class="icon" stroke="#f0883e" d="M98 22a6 6 0 0 0-8 6l-7 7 3.5 3.5 7-7a6 6 0 0 0 6-8l-3.5 3.5-3-3z"/>
      <text class="hd" x="91" y="68" text-anchor="middle" font-size="12">npm run fix:staged</text>
      <text class="bd" x="91" y="94" text-anchor="middle">targets staged files</text>
      <text class="bd" x="91" y="116" text-anchor="middle">refuses partial staging</text>
      <text class="bd" x="91" y="138" text-anchor="middle">re-stages safe fixes</text>
    </g>
    <g transform="translate(209 76)">
      <rect class="card orange" width="182" height="152" rx="10"/>
      <circle class="icon" cx="91" cy="30" r="16" stroke="#f0883e"/>
      <path class="icon" stroke="#f0883e" d="M98 22a6 6 0 0 0-8 6l-7 7 3.5 3.5 7-7a6 6 0 0 0 6-8l-3.5 3.5-3-3z"/>
      <text class="hd" x="91" y="68" text-anchor="middle" font-size="12">npm run commit:fix</text>
      <text class="bd" x="91" y="94" text-anchor="middle">latest unpushed commit</text>
      <text class="bd" x="91" y="116" text-anchor="middle">requires clean tree</text>
      <text class="bd" x="91" y="138" text-anchor="middle">amends safely</text>
    </g>
    <rect class="card orange" x="16" y="268" width="375" height="40" rx="8"/>
    <path class="icon" stroke="#f0883e" d="M114 276l8 3v6c0 6-5 9.5-8 11-3-1.5-8-5-8-11v-6z"/>
    <text class="orangeText" x="216" y="292" text-anchor="middle" font-weight="700" font-size="13" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Refuses unsafe mutations</text>
  </g>

  <!-- 5 Pre-push flow -->
  <g transform="translate(20 637)">
    <rect class="panel cyan" width="984" height="140" rx="12"/>
    <rect x="16" y="14" width="30" height="30" rx="7" fill="#0e7490"/>
    <text class="badge" x="31" y="35" text-anchor="middle">5</text>
    <text class="sec cyanText" x="58" y="35">Pre-push flow</text>

    <g transform="translate(16 52)">
      <rect class="card" width="120" height="46" rx="8"/>
      <path class="icon" stroke="#56d4e8" d="M18 32V14M11 21l7-7 7 7"/>
      <text class="hd" x="38" y="27">git push</text>
    </g>
    <path class="arrow" d="M142 75h16"/>
    <g transform="translate(164 52)">
      <rect class="card" width="158" height="46" rx="8"/>
      <path class="icon" stroke="#9aa4b2" d="M11 12h9l5 5v17H11zM20 12v5h5M15 24h8M15 30h8"/>
      <text class="hd" x="34" y="21">Read pushed refs</text>
      <text class="bd" x="34" y="36">changed files</text>
    </g>
    <path class="arrow" d="M328 75h16"/>
    <g transform="translate(350 52)">
      <rect class="card" width="140" height="46" rx="8"/>
      <path class="icon" stroke="#9aa4b2" d="M16 27l8-8M20 17l2.5-2.5a4 4 0 0 1 5.5 5.5L25.5 22.5M18.5 23.5L16 26a4 4 0 0 0 5.5 5.5L24 29"/>
      <text class="hd" x="36" y="21">Collect related</text>
      <text class="bd" x="36" y="36">tests</text>
    </g>
    <path class="arrow" d="M496 75h14"/>
    <g transform="translate(516 52)">
      <rect class="card" width="126" height="46" rx="8"/>
      <path class="icon" stroke="#56d4e8" d="M15 12v8l-6 12h18l-6-12v-8M12.5 12h11"/>
      <text class="hd" x="36" y="21">Run tests</text>
      <text class="mono" x="36" y="36">node --test</text>
    </g>
    <path class="arrow" d="M648 75h14"/>
    <path d="M718 31L770 75L718 119L666 75Z" fill="#0a2129" stroke="#29c4dd" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="bd" x="718" y="71" text-anchor="middle">Test</text>
    <text class="bd" x="718" y="85" text-anchor="middle">results</text>

    <path class="elbowGreen" d="M770 75H788V29H806"/>
    <g transform="translate(810 10)">
      <rect class="card green" width="158" height="38" rx="8"/>
      <circle class="icon" cx="18" cy="19" r="10" stroke="#56d364"/>
      <path class="icon" stroke="#56d364" d="M13.5 19l3.5 3.5 6.5-8"/>
      <text class="greenText" x="34" y="17" font-weight="700" font-size="11" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Tests pass</text>
      <text class="bd" x="34" y="31">push allowed</text>
    </g>
    <path class="arrowOrange" d="M770 75H788V73H806"/>
    <g transform="translate(810 54)">
      <rect class="card orange" width="158" height="38" rx="8"/>
      <path class="icon" stroke="#ffb224" d="M18 9l9 15.5H9zM18 15v5"/>
      <circle cx="18" cy="22.5" r="1.1" fill="#ffb224"/>
      <text class="warnText" x="34" y="17" font-weight="700" font-size="11" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Fail advisory</text>
      <text class="bd" x="34" y="31">warn, allow</text>
    </g>
    <path class="arrowRed" d="M770 75H788V117H806"/>
    <g transform="translate(810 98)">
      <rect class="card red" width="158" height="38" rx="8"/>
      <circle class="icon" cx="18" cy="19" r="10" stroke="#f85149"/>
      <path class="icon" stroke="#f85149" d="M14 15l8 8M22 15l-8 8"/>
      <text class="redText" x="34" y="17" font-weight="700" font-size="11" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Fail blocking</text>
      <text class="bd" x="34" y="31">push blocked</text>
    </g>
  </g>

  <!-- Core idea footer -->
  <rect x="20" y="790" width="984" height="40" rx="8" fill="#0d1219" stroke="#2a3340" stroke-width="1.4" filter="url(#shadow)"/>
  <path class="icon" stroke="#f2f7ff" d="M42 799a7 7 0 0 0-4 12.5v3.5h8v-3.5A7 7 0 0 0 42 799zM38.5 818.5h7M42 795.5V793M32.5 799l-2-2M51.5 799l2-2"/>
  <text class="hd" x="60" y="814">Core idea:</text>
  <text class="bd" x="128" y="814" font-size="11">Own the Git hook workflow directly, stay advisory-first by default, and only block or mutate when it is safe or explicitly configured.</text>
</svg>
