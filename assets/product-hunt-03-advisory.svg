<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="760" viewBox="0 0 1270 760" role="img" aria-labelledby="title desc">
  <title id="title">Commitment Issues gives an immediate advisory warning</title>
  <desc id="desc">A warning identifies two fixable problems, lets the commit continue by default, and gives the exact command to fix them.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a18"/>
      <stop offset="0.58" stop-color="#10132b"/>
      <stop offset="1" stop-color="#17102b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5555"/>
      <stop offset="1" stop-color="#ff7a67"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sans { font-family: "DejaVu Sans", sans-serif; }
      .mono { font-family: "DejaVu Sans Mono", monospace; }
    </style>
  </defs>
  <rect width="1270" height="760" fill="url(#background)"/>
  <circle cx="1120" cy="10" r="240" fill="#665b00" opacity="0.09"/>
  <g class="sans">
    <text x="68" y="58" fill="#b8bed6" font-size="16" font-weight="800" letter-spacing="2.4">COMMITMENT</text>
    <text x="220" y="58" fill="url(#brand)" font-size="16" font-weight="900" letter-spacing="2.4">ISSUES</text>
    <text x="68" y="137" fill="#f8fafc" font-size="52" font-weight="900" letter-spacing="-1.3">A mistake is spotted immediately.</text>
    <text x="68" y="182" fill="#abb4cc" font-size="25" font-weight="600">By default, your commit continues. You get one clear next step.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="168" y="236" width="934" height="370" rx="26" fill="#181818" stroke="#b9ce00" stroke-width="2"/>
  </g>
  <rect x="506" y="218" width="258" height="42" rx="21" fill="#181818"/>
  <g class="sans" text-anchor="middle">
    <circle cx="510" cy="239" r="7" fill="#dfff00" filter="url(#glow)"/>
    <text x="651" y="247" fill="#dfff00" font-size="19" font-weight="900" letter-spacing="2">COMMIT CONTINUES</text>
  </g>
  <g class="mono">
    <text x="228" y="320" fill="#dfff00" font-size="31" font-weight="800">Pre-commit suggestions found</text>
    <text x="228" y="378" fill="#9298a0" font-size="25">Suggestions:</text>
    <text x="228" y="438" fill="#dfff00" font-size="27">→ 2 auto-fixable ESLint issues found</text>
    <text x="228" y="504" fill="#9298a0" font-size="25">apply automatic fixes and amend it:</text>
    <rect x="218" y="535" width="540" height="48" rx="10" fill="#232323"/>
    <text x="244" y="570" fill="#f4f7fb" font-size="27" font-weight="800">npm run commit:fix</text>
  </g>

  <g class="sans" font-size="19" font-weight="800" text-anchor="middle">
    <rect x="168" y="637" width="278" height="54" rx="27" fill="#17243b" stroke="#395276"/>
    <text x="307" y="671" fill="#c7d6ee">SPOTS THE PROBLEM</text>
    <rect x="466" y="637" width="336" height="54" rx="27" fill="#17243b" stroke="#395276"/>
    <text x="634" y="671" fill="#c7d6ee">GIVES THE EXACT COMMAND</text>
    <rect x="822" y="637" width="280" height="54" rx="27" fill="#17243b" stroke="#395276"/>
    <text x="962" y="671" fill="#c7d6ee">STAYS OUT OF THE WAY</text>
  </g>
  <text x="1168" y="716" class="sans" fill="#8f99b3" font-size="16" font-weight="800" text-anchor="end" letter-spacing="2">03 / 04</text>
</svg>
