<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="760" viewBox="0 0 1270 760" role="img" aria-labelledby="title desc">
  <title id="title">Run the safe fix and send once</title>
  <desc id="desc">The suggested command safely fixes the latest commit, confirms success, and leaves the work ready to send once.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a18"/>
      <stop offset="0.58" stop-color="#10132b"/>
      <stop offset="1" stop-color="#17102b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5555"/>
      <stop offset="1" stop-color="#ff7a67"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sans { font-family: "DejaVu Sans", sans-serif; }
      .mono { font-family: "DejaVu Sans Mono", monospace; }
    </style>
  </defs>
  <rect width="1270" height="760" fill="url(#background)"/>
  <circle cx="1150" cy="15" r="250" fill="#0d9488" opacity="0.10"/>
  <g class="sans">
    <text x="68" y="58" fill="#b8bed6" font-size="16" font-weight="800" letter-spacing="2.4">COMMITMENT</text>
    <text x="220" y="58" fill="url(#brand)" font-size="16" font-weight="900" letter-spacing="2.4">ISSUES</text>
    <text x="68" y="137" fill="#f8fafc" font-size="52" font-weight="900" letter-spacing="-1.3">Run the fix. Send once.</text>
    <text x="68" y="182" fill="#abb4cc" font-size="25" font-weight="600">The suggested command fixes the latest commit safely.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="68" y="250" width="470" height="202" rx="24" fill="#11172a" stroke="#465171" stroke-width="2"/>
    <rect x="670" y="232" width="532" height="238" rx="24" fill="#102d2b" stroke="#2d8c82" stroke-width="2"/>
  </g>
  <g class="sans">
    <text x="106" y="298" fill="#8f99b3" font-size="18" font-weight="800" letter-spacing="2">RUN THE SUGGESTED COMMAND</text>
  </g>
  <rect x="100" y="332" width="406" height="78" rx="14" fill="#080d1b" stroke="#2c3552"/>
  <text x="126" y="382" class="mono" fill="#f3f6fb" font-size="27" font-weight="800" xml:space="preserve"><tspan fill="#747e97">$ </tspan>npm run commit:fix</text>

  <path d="M570 350 H628" fill="none" stroke="#45e0cf" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M616 335 L634 350 616 365" fill="none" stroke="#45e0cf" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <g class="sans">
    <circle cx="726" cy="290" r="25" fill="#173f3a" stroke="#45e0cf" stroke-width="2"/>
    <path d="M713 290 L723 300 740 279" fill="none" stroke="#7af2e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="770" y="298" fill="#7af2e5" font-size="20" font-weight="900" letter-spacing="2">SUCCESS</text>
    <text x="716" y="361" fill="#e2fffb" font-size="28" font-weight="850">Latest commit amended</text>
    <text x="716" y="397" fill="#e2fffb" font-size="28" font-weight="850">with automatic fixes.</text>
    <text x="716" y="438" fill="#91b9b4" font-size="20">Unsafe changes are refused.</text>
  </g>

  <rect x="68" y="526" width="1134" height="140" rx="24" fill="#0d2927" stroke="#247068" stroke-width="2"/>
  <g class="sans" font-weight="900" text-anchor="middle">
    <circle cx="314" cy="596" r="37" fill="#173f3a" stroke="#45e0cf" stroke-width="2"/>
    <text x="314" y="606" fill="#7af2e5" font-size="27">1</text>
    <text x="314" y="650" fill="#bffaf3" font-size="20">FIX</text>
    <path d="M372 596 H570" fill="none" stroke="#2fae9f" stroke-width="5" stroke-linecap="round"/>
    <path d="M556 584 L573 596 556 608" fill="none" stroke="#2fae9f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="635" cy="596" r="37" fill="#173f3a" stroke="#45e0cf" stroke-width="2"/>
    <text x="635" y="606" fill="#7af2e5" font-size="27">2</text>
    <text x="635" y="650" fill="#bffaf3" font-size="20">SEND</text>
    <path d="M693 596 H891" fill="none" stroke="#2fae9f" stroke-width="5" stroke-linecap="round"/>
    <path d="M877 584 L894 596 877 608" fill="none" stroke="#2fae9f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="956" cy="596" r="37" fill="#173f3a" stroke="#45e0cf" stroke-width="2"/>
    <path d="M938 596 L951 609 976 580" fill="none" stroke="#7af2e5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="956" y="650" fill="#bffaf3" font-size="20">DONE</text>
  </g>
  <text x="1168" y="716" class="sans" fill="#8f99b3" font-size="16" font-weight="800" text-anchor="end" letter-spacing="2">04 / 04</text>
</svg>
