version: 2
updates:
  # Keep npm dependencies up to date.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: build
      include: scope
    groups:
      # Batch low-risk updates into a single PR to reduce noise.
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep GitHub Actions used in workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
