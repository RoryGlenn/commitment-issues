name: Publish Package

on:
  pull_request:
    paths:
      - ".github/workflows/publish.yml"
      - ".github/release-history.json"
      - "CHANGELOG.md"
      - "package.json"
      - "package-lock.json"
      - "tools/lib/release-artifact.mjs"
      - "tools/run-migration-lifecycle-test.mjs"
      - "tools/release-preflight.mjs"
      - "tools/release-recovery.mjs"
      - "tools/release-stage.mjs"
      - "tools/validate-release-metadata.mjs"
      - "tools/verify-release-mainline.mjs"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact prepared release tag, for example v3.5.0
        required: true
        type: string
      source_run_id:
        description: Successful tag workflow run that prepared the draft
        required: true
        type: string
      stage_id:
        description: Exact npm stage ID approved with maintainer 2FA
        required: true
        type: string

permissions:
  contents: read

# Never cancel work after it may have crossed an external boundary. Tag and
# finalizer runs share one queue, while pull-request validation remains isolated.
concurrency:
  group: publish-${{ github.event_name == 'pull_request' && github.ref || 'package' }}
  cancel-in-progress: false
  queue: max

jobs:
  # Loading this workflow on pull requests makes GitHub validate every job and
  # reusable-workflow permission contract before a release tag can consume it.
  validate:
    name: Validate release workflow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Confirm release workflow validation
        run: npm run release:validate

  candidate:
    name: Build and verify release candidate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release commit belongs to reviewed mainline
        run: node tools/verify-release-mainline.mjs

      - name: Validate release metadata and reviewed notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:validate -- --tag "$RELEASE_TAG"

      - name: Ensure npm supports staged trusted publishing
        run: |
          node -e "
            const { execFileSync } = require('node:child_process');
            const nodeVersion = process.versions.node;
            const npmVersion = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim();
            const atLeast = (actual, required) => {
              const parts = actual.split('.').map(Number);
              for (let index = 0; index < required.length; index += 1) {
                if (parts[index] !== required[index]) return parts[index] > required[index];
              }
              return true;
            };
            if (!atLeast(nodeVersion, [22, 14, 0]) || !atLeast(npmVersion, [11, 15, 0])) {
              console.error('Node >= 22.14.0 and npm >= 11.15.0 are required; found Node ' + nodeVersion + ' and npm ' + npmVersion);
              process.exit(1);
            }
            console.log('Node ' + nodeVersion + ' and npm ' + npmVersion + ' support staged trusted publishing');
          "

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test

      - name: Pack tarball
        id: pack
        run: |
          tarball="$(npm pack --silent | tail -n1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify exact npm package lifecycle
        # Publishing a tarball skips this package's prepublishOnly lifecycle.
        # Exercise the exact artifact before it is hashed, uploaded, or staged.
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm run test:lifecycle:npm -- --tarball "$TARBALL"

      - name: Verify exact npm upgrade migration
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: node tools/run-migration-lifecycle-test.mjs npm --tarball "$TARBALL"

      - name: Record hosted candidate identity
        id: hash
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          hash_line="$(sha256sum "$TARBALL")"
          hashes="$(printf '%s\n' "$hash_line" | base64 -w0)"
          sha256="${hash_line%% *}"
          node_version="$(node --version)"
          npm_version="$(npm --version)"
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"
          {
            echo "### Hosted release candidate built by this run"
            echo
            echo "| Evidence | Value |"
            echo "| --- | --- |"
            printf "| Filename | \`%s\` |\n" "$TARBALL"
            printf "| SHA-256 | \`%s\` |\n" "$sha256"
            printf "| Release tag | \`%s\` |\n" "$GITHUB_REF_NAME"
            printf "| Source commit | \`%s\` |\n" "$GITHUB_SHA"
            printf "| Runner | \`%s %s; %s %s\` |\n" \
              "$RUNNER_OS" "$RUNNER_ARCH" \
              "${ImageOS:-unknown-image}" "${ImageVersion:-unknown-version}"
            printf "| Node | \`%s\` |\n" "$node_version"
            printf "| npm | \`%s\` |\n" "$npm_version"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verified release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  stage:
    name: Stage npm package
    needs: [candidate]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # npm stage publish through trusted publishing
    outputs:
      stage_id: ${{ steps.record.outputs.stage_id }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download verified release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-tarball
          path: .

      - name: Verify release candidate handoff
        env:
          EXPECTED_HASHES: ${{ needs.candidate.outputs.hashes }}
        run: echo "$EXPECTED_HASHES" | base64 --decode | sha256sum --check

      - name: Require the before-stage recovery state
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARBALL: ${{ needs.candidate.outputs.tarball }}
        run: >-
          node tools/release-recovery.mjs
          --tarball "$TARBALL"
          --expect-state before-stage

      - name: Stage exact tested tarball on npm
        env:
          TARBALL: ${{ needs.candidate.outputs.tarball }}
        run: >-
          npm stage publish "./$TARBALL"
          --access public
          --tag latest
          --provenance
          --json
          > npm-stage-result.json

      - name: Record immutable npm stage identity
        id: record
        env:
          TARBALL: ${{ needs.candidate.outputs.tarball }}
        run: |
          node_version="$(node -p 'process.versions.node')"
          npm_version="$(npm --version)"
          node tools/release-stage.mjs record \
            --result npm-stage-result.json \
            --tarball "$TARBALL" \
            --output npm-stage-record.json \
            --release-tag "$GITHUB_REF_NAME" \
            --source-commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --node-version "$node_version" \
            --npm-version "$npm_version"

      - name: Confirm the staged recovery state
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARBALL: ${{ needs.candidate.outputs.tarball }}
        run: >-
          node tools/release-recovery.mjs
          --tarball "$TARBALL"
          --stage-record npm-stage-record.json
          --expect-state staged

      - name: Upload staged release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staged-release-candidate
          path: |
            ${{ needs.candidate.outputs.tarball }}
            npm-stage-record.json
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  # SLSA3 provenance for the exact candidate. The reusable workflow MUST use a
  # semantic version tag so it can verify its own release.
  provenance:
    name: Generate SLSA provenance
    needs: [candidate]
    if: github.event_name == 'push'
    permissions:
      actions: read # let the generator inspect the calling workflow
      id-token: write # sign provenance through GitHub OIDC
      contents: write # satisfy the reusable contract even without asset upload
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.candidate.outputs.hashes }}
      upload-assets: false

  prepare-draft:
    name: Prepare complete GitHub Release draft
    needs: [candidate, stage, provenance]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the complete release draft and upload its assets

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Download staged release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: staged-release-candidate
          path: release-assets

      - name: Download provenance artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: release-assets

      - name: Verify release candidate handoff
        working-directory: release-assets
        env:
          EXPECTED_HASHES: ${{ needs.candidate.outputs.hashes }}
        run: echo "$EXPECTED_HASHES" | base64 --decode | sha256sum --check

      - name: Install SLSA verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Cryptographically verify signed provenance
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          slsa-verifier verify-artifact release-assets/*.tgz \
            --provenance-path release-assets/*.intoto.jsonl \
            --source-uri github.com/RoryGlenn/commitment-issues \
            --source-tag "$RELEASE_TAG"

      - name: Validate staged candidate before drafting
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node tools/release-recovery.mjs
          --tarball release-assets/*.tgz
          --provenance release-assets/*.intoto.jsonl
          --stage-record release-assets/npm-stage-record.json
          --expect-state staged

      - name: Generate reviewed release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:validate -- --tag "$RELEASE_TAG" --notes-file release-notes.md

      - name: Create complete GitHub Release draft
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          overwrite_files: false
          files: |
            release-assets/*.tgz
            release-assets/*.intoto.jsonl
          fail_on_unmatched_files: true

      - name: Require the complete exact draft
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node tools/release-recovery.mjs
          --tarball release-assets/*.tgz
          --provenance release-assets/*.intoto.jsonl
          --stage-record release-assets/npm-stage-record.json
          --expect-state staged
          --require-prepared-draft

      - name: Upload immutable finalizer inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-finalizer-assets
          path: |
            release-assets/*.tgz
            release-assets/*.intoto.jsonl
            release-assets/npm-stage-record.json
          if-no-files-found: error
          overwrite: true
          retention-days: 30

      - name: Show maintainer approval instructions
        run: >-
          node tools/release-stage.mjs approval
          --record release-assets/npm-stage-record.json

  finalize:
    name: Finalize approved release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read # download the successful tag run's immutable inputs
      contents: write # publish the already-complete GitHub Release draft

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Resolve immutable release identity
        id: identity
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download prepared finalizer inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-finalizer-assets
          path: release-assets
          github-token: ${{ github.token }}
          run-id: ${{ inputs.source_run_id }}

      - name: Install SLSA verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Cryptographically verify prepared provenance
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          slsa-verifier verify-artifact release-assets/*.tgz \
            --provenance-path release-assets/*.intoto.jsonl \
            --source-uri github.com/RoryGlenn/commitment-issues \
            --source-tag "$RELEASE_TAG"

      - name: Require npm approval and exact prepared draft
        id: recovery
        env:
          EXPECTED_STAGE_ID: ${{ inputs.stage_id }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_COMMIT: ${{ steps.identity.outputs.commit }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: >-
          node tools/release-recovery.mjs
          --tarball release-assets/*.tgz
          --provenance release-assets/*.intoto.jsonl
          --stage-record release-assets/npm-stage-record.json
          --source-run-id "$SOURCE_RUN_ID"
          --expected-stage-id "$EXPECTED_STAGE_ID"
          --require-npm
          --expect-state after-npm
          --expect-state complete

      - name: Publish the prepared GitHub Release draft
        if: steps.recovery.outputs.finalize_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.recovery.outputs.release_id }}
        run: >-
          gh api
          --method PATCH
          "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID"
          -F draft=false
          --silent

      - name: Confirm immutable release completion
        env:
          EXPECTED_STAGE_ID: ${{ inputs.stage_id }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_COMMIT: ${{ steps.identity.outputs.commit }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: >-
          node tools/release-recovery.mjs
          --tarball release-assets/*.tgz
          --provenance release-assets/*.intoto.jsonl
          --stage-record release-assets/npm-stage-record.json
          --source-run-id "$SOURCE_RUN_ID"
          --expected-stage-id "$EXPECTED_STAGE_ID"
          --require-npm
          --expect-state complete
