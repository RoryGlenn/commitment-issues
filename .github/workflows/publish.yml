name: Publish Package

on:
  pull_request:
    paths:
      - ".github/workflows/publish.yml"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Loading this workflow on pull requests makes GitHub validate the complete
  # reusable-workflow permission contract before a release tag can consume it.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Confirm release workflow validation
        run: echo "GitHub validated the release workflow and its reusable workflow contracts."

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) + registry provenance
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify tag matches package.json version
        run: |
          pkg_version="v$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

      - name: Ensure npm supports trusted publishing
        # Trusted publishing (OIDC) needs npm >= 11.5.1. Node 24 bundles a
        # capable npm; verify instead of running `npm install -g npm@latest`,
        # which self-updates npm in place and has corrupted the install
        # (MODULE_NOT_FOUND: sigstore) mid-publish before.
        run: |
          node -e "
            const { execSync } = require('node:child_process');
            const version = execSync('npm --version', { encoding: 'utf8' }).trim();
            const [major, minor, patch] = version.split('.').map(Number);
            const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
            if (!ok) { console.error('npm >= 11.5.1 required for trusted publishing, found ' + version); process.exit(1); }
            console.log('npm ' + version + ' supports trusted publishing');
          "

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test

      - name: Verify npm package lifecycle
        # Publishing a tarball skips this package's prepublishOnly lifecycle.
        # Run the packaging smoke before creating the exact release artifact.
        run: npm run test:lifecycle:npm

      - name: Pack tarball
        id: pack
        run: |
          tarball="$(npm pack --silent | tail -n1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Generate provenance subject
        id: hash
        run: |
          hashes="$(sha256sum "${{ steps.pack.outputs.tarball }}" | base64 -w0)"
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 5

      - name: Publish to npm
        run: npm publish "./${{ steps.pack.outputs.tarball }}" --access public

  # SLSA3 provenance for the packed tarball. The reusable workflow MUST be
  # referenced by a semantic version tag (never a SHA) per SLSA's design so it
  # can verify its own release; Dependabot keeps the tag current.
  provenance:
    needs: [publish]
    permissions:
      actions: read # detect the workflow path for provenance
      id-token: write # sign the provenance
      # The reusable workflow declares a nested contents:write upload job.
      # GitHub validates that contract even though upload-assets is false.
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.hashes }}
      # Keep the signed provenance as a workflow artifact. The final job must
      # upload every release asset before an immutable release is published.
      upload-assets: false

  publish-release:
    needs: [publish, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and attach both immutable assets
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-tarball
          path: release-assets

      - name: Download provenance artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: release-assets

      - name: Publish immutable release with all assets
        # v3 stages a standard release as a draft, uploads every file, and
        # publishes only after the uploads succeed. Published releases are
        # immutable in this repository, so no later job can add an asset.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            release-assets/*.tgz
            release-assets/*.intoto.jsonl
          fail_on_unmatched_files: true
