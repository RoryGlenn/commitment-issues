name: DCO

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Verify commit sign-offs
        shell: bash
        env:
          DCO_BASE: ${{ github.event.pull_request.base.sha || '81a9e412bc347f01300df62505ee378284646d15' }}
          DCO_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            node tools/check-dco-range.mjs --merge-base "$DCO_BASE" "$DCO_HEAD"
          else
            node tools/check-dco-range.mjs "$DCO_BASE" "$DCO_HEAD"
          fi
