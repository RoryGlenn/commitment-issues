name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      HUSKY: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version:
          - "22.22.1"
          - "24"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - name: Package lifecycle smoke
        run: npm run prepublishOnly

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run test:coverage

  pm-smoke:
    name: ${{ matrix.pm }} lifecycle smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        pm: [pnpm, yarn, bun]

    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: npm ci

      - name: ${{ matrix.pm }} lifecycle smoke
        run: npm run test:smoke:${{ matrix.pm }}

  # Single aggregate gate for branch protection. Requiring this one context
  # keeps the required-checks list stable even as the matrix above changes.
  ci-success:
    name: CI Success
    if: always()
    needs: [check, pm-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1
      - name: All required jobs passed
        run: echo "All required jobs succeeded."
