name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Verify prospective DCO enforcement
        shell: bash
        env:
          DCO_BASE: ${{ github.event.pull_request.base.sha || '265d2e6c9c12349a1c06fa8a9a6c6d3ac957e6d5' }}
          DCO_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # The base branch can advance after a PR opens. Audit commits that
            # are unique to the PR from the true merge base; the default
            # checkout keeps both parents of a fork PR's merge ref available.
            node tools/check-dco-range.mjs --merge-base "$DCO_BASE" "$DCO_HEAD"
          else
            # Pushes to main and manual audits must retain the documented
            # operational baseline as an ancestor.
            node tools/check-dco-range.mjs "$DCO_BASE" "$DCO_HEAD"
          fi

  quality:
    name: Static quality and workflow policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pinned actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail

          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          archive_path="$RUNNER_TEMP/$archive"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/$archive" \
            --output "$archive_path"
          echo "$ACTIONLINT_SHA256  $archive_path" | sha256sum --check
          tar -xzf "$archive_path" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions syntax, expressions, and scripts
        # GitHub supports concurrency.queue, but actionlint 1.7.12's schema
        # predates it. Ignore only that exact schema-lag diagnostic.
        run: actionlint -ignore 'unexpected key "queue" for "concurrency" section'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Reject high-severity dependency advisories
        run: npm audit --audit-level=high

      - run: npm run lint

      - run: npm run format:check

  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      COMMITMENT_ISSUES: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version:
          - "22.11.0"
          - "24"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # The two Ubuntu lanes run the same suite once under the coverage gates
      # below. The remaining OS lanes run it directly without duplicating work.
      - name: Unit and integration tests
        if: matrix.os != 'ubuntu-latest'
        run: npm test

      - name: Message-state single-box invariant
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run states

      - name: Prebuilt package lifecycle integration (separate from runtime coverage)
        run: node tools/run-prebuilt-lifecycle-test.mjs

      - name: 100% runtime coverage (Node 22.11.0)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.11.0'
        run: npm run test:coverage

      - name: 100% runtime coverage and badge freshness (Node 24)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run coverage:check

  pm-lifecycle:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }} / ${{ matrix.pm }} lifecycle
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        pm: [pnpm, yarn, bun]
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["24"]
        include:
          - pm: pnpm
            os: ubuntu-latest
            node-version: "22.11.0"
          - pm: yarn
            os: ubuntu-latest
            node-version: "22.11.0"
          - pm: bun
            os: ubuntu-latest
            node-version: "22.11.0"

    env:
      COMMITMENT_ISSUES: 0

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - run: npm ci

      - name: pnpm lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'pnpm'
        run: npm run test:lifecycle:pnpm

      - name: Yarn lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'yarn'
        run: npm run test:lifecycle:yarn

      - name: Bun lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'bun'
        run: npm run test:lifecycle:bun

  migration-lifecycle:
    name: Ubuntu / Node 24 / npm migration lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Upgrade from supported historical package boundaries
        run: node tools/run-migration-lifecycle-test.mjs npm

  codeql:
    name: CodeQL
    permissions:
      actions: read # let CodeQL inspect workflow metadata
      contents: read # scan the checked-out source
      security-events: write # upload SARIF to code scanning
    uses: ./.github/workflows/codeql.yml

  # Single aggregate gate for branch protection. Requiring this one context
  # keeps the required-checks list stable even as the matrix above changes.
  ci-success:
    name: CI Success
    if: always()
    needs: [dco, quality, check, pm-lifecycle, migration-lifecycle, codeql]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs succeeded
        if: >-
          ${{
            needs.dco.result != 'success' ||
            needs.quality.result != 'success' ||
            needs.check.result != 'success' ||
            needs['pm-lifecycle'].result != 'success' ||
            needs['migration-lifecycle'].result != 'success' ||
            needs.codeql.result != 'success'
          }}
        run: |
          echo "One or more required jobs did not succeed."
          exit 1
      - name: All required jobs passed
        run: echo "All required jobs succeeded."
