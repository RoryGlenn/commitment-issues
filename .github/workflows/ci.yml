name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify required CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      route: ${{ steps.changes.outputs.route }}
      full_graph: ${{ steps.changes.outputs.full_graph }}
      docs_only: ${{ steps.changes.outputs.docs_only }}
      categories: ${{ steps.changes.outputs.categories }}
      reason: ${{ steps.changes.outputs.reason }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Classify the complete diff with trusted code
        id: changes
        shell: bash
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          TRUSTED_CLASSIFIER: ${{ runner.temp }}/classify-ci-changes.mjs
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            node tools/classify-ci-changes.mjs
            exit 0
          fi

          # Execute the base branch's classifier, not pull-request code. The
          # fixed fallback bootstraps this rollout and keeps missing source on
          # the full route; any later extraction/execution failure leaves no
          # trusted outputs, which also launches the full graph and fails the
          # aggregate.
          if ! [[ "$CI_BASE_SHA" =~ ^[0-9a-fA-F]{40}([0-9a-fA-F]{24})?$ ]] ||
            ! git cat-file -e "$CI_BASE_SHA^{commit}" 2>/dev/null ||
            ! git cat-file -e "$CI_BASE_SHA:tools/classify-ci-changes.mjs" 2>/dev/null; then
            {
              echo "route=full"
              echo "full_graph=true"
              echo "docs_only=false"
              echo "categories=unknown"
              echo "reason=trusted-classifier-unavailable"
            } >> "$GITHUB_OUTPUT"
            echo "CI route: full (trusted-classifier-unavailable; unknown)."
            exit 0
          fi

          git cat-file blob "$CI_BASE_SHA:tools/classify-ci-changes.mjs" > "$TRUSTED_CLASSIFIER"
          node "$TRUSTED_CLASSIFIER"

      - name: Summarize CI route
        if: always()
        shell: bash
        env:
          CI_ROUTE: ${{ steps.changes.outputs.route }}
          CI_FULL_GRAPH: ${{ steps.changes.outputs.full_graph }}
          CI_DOCS_ONLY: ${{ steps.changes.outputs.docs_only }}
          CI_CATEGORIES: ${{ steps.changes.outputs.categories }}
          CI_REASON: ${{ steps.changes.outputs.reason }}
        run: |
          route="${CI_ROUTE:-unavailable}"
          full_graph="${CI_FULL_GRAPH:-unavailable}"
          docs_only="${CI_DOCS_ONLY:-unavailable}"
          categories="${CI_CATEGORIES:-unavailable}"
          reason="${CI_REASON:-unavailable}"

          {
            echo "## CI routing"
            echo
            echo '| Field | Value |'
            echo '| --- | --- |'
            printf '| Route | %s |\n' "$route"
            printf '| Full graph | %s |\n' "$full_graph"
            printf '| Documentation only | %s |\n' "$docs_only"
            printf '| Categories | %s |\n' "$categories"
            printf '| Reason | %s |\n' "$reason"
          } >> "$GITHUB_STEP_SUMMARY"

  dco:
    name: DCO
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Verify prospective DCO enforcement
        shell: bash
        env:
          DCO_BASE: ${{ github.event.pull_request.base.sha || '495d25a2dcfea5f4ee7857fed2b3a1d845ca9a19' }}
          DCO_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # The base branch can advance after a PR opens. Audit commits that
            # are unique to the PR from the true merge base; the default
            # checkout keeps both parents of a fork PR's merge ref available.
            node tools/check-dco-range.mjs --merge-base "$DCO_BASE" "$DCO_HEAD"
          else
            # Pushes to main and manual audits must retain the documented
            # operational baseline as an ancestor.
            node tools/check-dco-range.mjs "$DCO_BASE" "$DCO_HEAD"
          fi

  quality:
    name: Static quality and workflow policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pinned actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail

          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          archive_path="$RUNNER_TEMP/$archive"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/$archive" \
            --output "$archive_path"
          echo "$ACTIONLINT_SHA256  $archive_path" | sha256sum --check
          tar -xzf "$archive_path" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions syntax, expressions, and scripts
        # GitHub supports concurrency.queue, but actionlint 1.7.12's schema
        # predates it. Ignore only that exact schema-lag diagnostic.
        run: actionlint -ignore 'unexpected key "queue" for "concurrency" section'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Reject high-severity dependency advisories
        run: npm audit --audit-level=high

      - run: npm run lint

      - run: npm run format:check

      - name: Documentation, metadata, link, asset, and policy tests
        run: >-
          node --test
          test/ci-change-classifier.test.mjs
          test/ci-policy.test.mjs
          test/json-output.test.mjs
          test/message-state-assets-check.test.mjs
          test/metadata.test.mjs
          test/packed-markdown-links.test.mjs
          test/release-integrity.test.mjs
          test/release-metadata.test.mjs
          test/shell-compat.test.mjs
          test/test-quality.test.mjs
          test/visual-assets.test.mjs

  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      COMMITMENT_ISSUES: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version:
          - "22.11.0"
          - "24"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # The two Ubuntu lanes run the same suite once under the coverage gates
      # below. macOS runs the complete suite directly; Windows owns the two
      # complementary native test-file shards in the separate matrix below.
      - name: Unit and integration tests
        if: matrix.os == 'macos-latest'
        run: npm test

      - name: Message-state single-box invariant
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run states

      - name: Generated message-state SVGs are current
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run states:assets:check

      - name: Prebuilt package lifecycle integration (separate from runtime coverage)
        run: node tools/run-prebuilt-lifecycle-test.mjs

      - name: 100% runtime coverage (Node 22.11.0)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.11.0'
        run: npm run test:coverage

      - name: 100% runtime coverage and badge freshness (Node 24)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run coverage:check

  windows-tests:
    name: Windows / Node ${{ matrix.node-version }} / test shard ${{ matrix.shard }}/2
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    runs-on: windows-latest
    timeout-minutes: 10

    env:
      COMMITMENT_ISSUES: 0

    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.11.0", "24"]
        shard: [1, 2]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Keep these commands literal: package-script argument forwarding puts
      # the shard flag after the file operands and can run the full suite.
      - name: Unit and integration tests (shard 1/2)
        if: matrix.shard == 1
        run: node --test --test-shard=1/2 test/*.test.mjs test/*.test.js

      - name: Unit and integration tests (shard 2/2)
        if: matrix.shard == 2
        run: node --test --test-shard=2/2 test/*.test.mjs test/*.test.js

  windows-npm-lifecycle:
    name: Windows / Node ${{ matrix.node-version }} / npm lifecycle
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    runs-on: windows-latest
    timeout-minutes: 10

    env:
      COMMITMENT_ISSUES: 0

    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.11.0", "24"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Prebuilt package lifecycle integration (separate from runtime coverage)
        run: node tools/run-prebuilt-lifecycle-test.mjs

  shell-compat:
    name: ${{ matrix.name }} packed shell lifecycle
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux /bin/sh
            os: ubuntu-latest
            target: sh
          - name: Linux Bash
            os: ubuntu-latest
            target: bash
          - name: Linux Fish
            os: ubuntu-latest
            target: fish
          - name: macOS /bin/sh
            os: macos-latest
            target: sh
          - name: macOS Zsh
            os: macos-latest
            target: zsh
          - name: Windows PowerShell
            os: windows-latest
            target: powershell
          - name: Windows Command Prompt
            os: windows-latest
            target: cmd

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - name: Install Fish interpreter
        if: matrix.target == 'fish'
        shell: bash
        run: sudo apt-get update && sudo apt-get install --yes fish

      - run: npm ci

      - name: Run packed lifecycle from target shell
        env:
          SHELL_COMPAT_TARGET: ${{ matrix.target }}
        run: npm run test:shell-compat

  pm-lifecycle:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }} / ${{ matrix.pm }} lifecycle
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        pm: [pnpm, yarn, yarn-berry, bun]
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["24"]
        include:
          - pm: pnpm
            os: ubuntu-latest
            node-version: "22.11.0"
          - pm: yarn
            os: ubuntu-latest
            node-version: "22.11.0"
          - pm: yarn-berry
            os: ubuntu-latest
            node-version: "22.11.0"
          - pm: bun
            os: ubuntu-latest
            node-version: "22.11.0"

    env:
      COMMITMENT_ISSUES: 0

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - run: npm ci

      - name: Install pinned Yarn Berry 4.17.0 CLI fixture
        if: matrix.pm == 'yarn-berry'
        run: npm ci --ignore-scripts --prefix test/fixtures/yarn-berry

      - name: Audit pinned Yarn Berry CLI fixture
        if: matrix.pm == 'yarn-berry'
        run: npm audit --audit-level=high --prefix test/fixtures/yarn-berry

      - name: pnpm lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'pnpm'
        run: npm run test:lifecycle:pnpm

      - name: Yarn Classic 1.22.22 lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'yarn'
        run: npm run test:lifecycle:yarn

      - name: Yarn Berry 4.17.0 node-modules lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'yarn-berry'
        run: npm run test:lifecycle:yarn-berry

      - name: Bun lifecycle integration (separate from runtime coverage)
        if: matrix.pm == 'bun'
        run: npm run test:lifecycle:bun

  migration-lifecycle:
    name: Ubuntu / Node 24 / npm migration lifecycle
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Upgrade from supported historical package boundaries
        run: node tools/run-migration-lifecycle-test.mjs npm

  codeql:
    name: CodeQL
    needs: classify
    if: >-
      ${{
        !cancelled() &&
        (
          needs.classify.result != 'success' ||
          needs.classify.outputs.route != 'docs' ||
          needs.classify.outputs.full_graph != 'false' ||
          needs.classify.outputs.docs_only != 'true' ||
          needs.classify.outputs.categories != 'documentation-metadata' ||
          needs.classify.outputs.reason != 'docs-only'
        )
      }}
    permissions:
      actions: read # let CodeQL inspect workflow metadata
      contents: read # scan the checked-out source
      security-events: write # upload SARIF to code scanning
    uses: ./.github/workflows/codeql.yml

  # Single aggregate gate for branch protection. Requiring this one context
  # keeps the required-checks list stable even as the matrix above changes.
  ci-success:
    name: CI Success
    if: always()
    needs:
      [
        classify,
        dco,
        quality,
        check,
        windows-tests,
        windows-npm-lifecycle,
        shell-compat,
        pm-lifecycle,
        migration-lifecycle,
        codeql,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs succeeded
        if: >-
          ${{
            needs.classify.result != 'success' ||
            needs.dco.result != 'success' ||
            needs.quality.result != 'success' ||
            (
              needs.classify.outputs.route == 'docs' &&
              (
                needs.classify.outputs.full_graph != 'false' ||
                needs.classify.outputs.docs_only != 'true' ||
                needs.classify.outputs.categories != 'documentation-metadata' ||
                needs.classify.outputs.reason != 'docs-only' ||
                needs.check.result != 'skipped' ||
                needs['windows-tests'].result != 'skipped' ||
                needs['windows-npm-lifecycle'].result != 'skipped' ||
                needs['shell-compat'].result != 'skipped' ||
                needs['pm-lifecycle'].result != 'skipped' ||
                needs['migration-lifecycle'].result != 'skipped' ||
                needs.codeql.result != 'skipped'
              )
            ) ||
            (
              needs.classify.outputs.route == 'full' &&
              (
                needs.classify.outputs.full_graph != 'true' ||
                needs.classify.outputs.docs_only != 'false' ||
                needs.check.result != 'success' ||
                needs['windows-tests'].result != 'success' ||
                needs['windows-npm-lifecycle'].result != 'success' ||
                needs['shell-compat'].result != 'success' ||
                needs['pm-lifecycle'].result != 'success' ||
                needs['migration-lifecycle'].result != 'success' ||
                needs.codeql.result != 'success'
              )
            ) ||
            (
              needs.classify.outputs.route != 'docs' &&
              needs.classify.outputs.route != 'full'
            )
          }}
        run: |
          echo "The classifier route or one or more required jobs was incomplete."
          exit 1
      - name: All required jobs passed
        run: echo "All jobs required for the classified change succeeded."
