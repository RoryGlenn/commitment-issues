name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      HUSKY: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - name: Package bin smoke
        shell: pwsh
        run: |
          $packDir = Join-Path $env:RUNNER_TEMP "commitment-issues-pack"
          $smokeDir = Join-Path $env:RUNNER_TEMP "commitment-issues-smoke"

          Remove-Item -Recurse -Force $packDir, $smokeDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packDir, $smokeDir | Out-Null

          npm pack --pack-destination $packDir
          $tarball = Get-ChildItem -Path $packDir -Filter "*.tgz" | Select-Object -First 1 -ExpandProperty FullName

          Push-Location $smokeDir
          try {
            npm init -y
            npm install $tarball
            npx --no-install commitment-issues --help
          } finally {
            Pop-Location
          }

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24
        run: npm run test:coverage
