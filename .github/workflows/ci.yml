name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      HUSKY: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24
        run: npm run test:coverage

      - name: Package smoke test
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24
        shell: bash
        run: |
          npm pack
          mkdir -p /tmp/commitment-issues-smoke
          cd /tmp/commitment-issues-smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE"/commitment-issues-*.tgz
          npx commitment-issues --help
