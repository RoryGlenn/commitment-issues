name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Verify prospective DCO enforcement
        shell: bash
        env:
          DCO_BASE: ${{ github.event.pull_request.base.sha || '81a9e412bc347f01300df62505ee378284646d15' }}
          DCO_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # The base branch can advance after a PR opens. Audit commits that
            # are unique to the PR from the true merge base; the default
            # checkout keeps both parents of a fork PR's merge ref available.
            node tools/check-dco-range.mjs --merge-base "$DCO_BASE" "$DCO_HEAD"
          else
            # Pushes to main and manual audits must retain the immutable
            # prospective baseline as an ancestor.
            node tools/check-dco-range.mjs "$DCO_BASE" "$DCO_HEAD"
          fi

  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      COMMITMENT_ISSUES: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version:
          - "22.22.1"
          - "24"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - name: Package lifecycle integration
        run: npm run test:lifecycle:npm

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run test:coverage

  pm-lifecycle:
    name: ${{ matrix.pm }} lifecycle integration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        pm: [pnpm, yarn, bun]

    env:
      COMMITMENT_ISSUES: 0

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: npm ci

      - name: ${{ matrix.pm }} lifecycle integration
        run: npm run test:lifecycle:${{ matrix.pm }}

  # Single aggregate gate for branch protection. Requiring this one context
  # keeps the required-checks list stable even as the matrix above changes.
  ci-success:
    name: CI Success
    if: always()
    needs: [dco, check, pm-lifecycle]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1
      - name: All required jobs passed
        run: echo "All required jobs succeeded."
