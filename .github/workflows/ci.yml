name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      HUSKY: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version:
          - "22.22.1"
          - "24"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - name: Package lifecycle smoke
        run: npm run prepublishOnly

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: npm run test:coverage

  pm-smoke:
    name: ${{ matrix.pm }} lifecycle smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        pm: [pnpm, yarn, bun]

    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@v2

      - run: npm ci

      - name: ${{ matrix.pm }} lifecycle smoke
        run: npm run test:smoke:${{ matrix.pm }}

  # Single aggregate gate for branch protection. Requiring this one context
  # keeps the required-checks list stable even as the matrix above changes.
  ci-success:
    name: CI Success
    if: always()
    needs: [check, pm-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1
      - name: All required jobs passed
        run: echo "All required jobs succeeded."
