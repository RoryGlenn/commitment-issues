name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    env:
      HUSKY: 0

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["22.22.1", 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - name: Package lifecycle smoke
        shell: pwsh
        env:
          HUSKY: ""
        run: |
          $ErrorActionPreference = "Stop"

          $packDir = Join-Path $env:RUNNER_TEMP "commitment-issues-pack"
          $smokeDir = Join-Path $env:RUNNER_TEMP "commitment-issues-smoke"
          $remoteDir = Join-Path $env:RUNNER_TEMP "commitment-issues-remote.git"

          Remove-Item -Recurse -Force $packDir, $smokeDir, $remoteDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packDir, $smokeDir | Out-Null

          npm pack --pack-destination $packDir
          $tarball = Get-ChildItem -Path $packDir -Filter "*.tgz" | Select-Object -First 1 -ExpandProperty FullName

          Push-Location $smokeDir
          try {
            git init
            git config user.name "commitment-issues-ci"
            git config user.email "commitment-issues-ci@example.com"

            npm init -y
            npm install -D $tarball husky lint-staged eslint prettier @eslint/js globals

            npx --no-install commitment-issues --help
            npx --no-install commitment-issues init

            @'
import js from "@eslint/js";
import globals from "globals";

export default [
  js.configs.recommended,
  {
    languageOptions: {
      globals: globals.node,
    },
  },
];
'@ | Set-Content -Path "eslint.config.js" -Encoding utf8

            New-Item -ItemType Directory -Force -Path "src", "test" | Out-Null

            @'
export const widget = () => 1;
'@ | Set-Content -Path "src/widget.mjs" -Encoding utf8

            @'
import test from "node:test";
import assert from "node:assert/strict";
import { widget } from "../src/widget.mjs";

test("widget", () => assert.equal(widget(), 1));
'@ | Set-Content -Path "test/widget.test.mjs" -Encoding utf8

            git add -A
            git commit -m "first checked commit"

            git init --bare $remoteDir
            git branch -M main
            git remote add origin $remoteDir
            git push -u origin main
          } finally {
            Pop-Location
          }

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24
        run: npm run test:coverage
