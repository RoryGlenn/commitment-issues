name: Render demo

on:
  pull_request:
    paths:
      - ".github/workflows/render-demo.yml"
      - "assets/before-after.png"
      - "assets/before-after.svg"
      - "assets/demo.gif"
      - "assets/product-hunt-*"
      - "promo/demo.tape"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "test/demo-visual-comparison.test.mjs"
      - "test/visual-assets.test.mjs"
      - "tools/compare-demo-gifs.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-demo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render deterministic demo
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Warm the locked npm cache for the offline demo fixture
        run: npm ci --ignore-scripts

      - name: Install pinned VHS renderer
        env:
          VHS_SHA256: 99cb634587eaae0473c1ea377db80c3a048c27f99fe0a7febb1a1e8cb7ee5009
          TTYD_SHA256: 8a217c968aba172e0dbf3f34447218dc015bc4d5e59bf51db2f2cd12b7be4f55
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes ffmpeg fonts-dejavu-core zsh

          mkdir -p "$RUNNER_TEMP/render-bin"
          curl --fail --location --silent --show-error \
            https://github.com/charmbracelet/vhs/releases/download/v0.11.0/vhs_0.11.0_Linux_x86_64.tar.gz \
            --output "$RUNNER_TEMP/vhs.tar.gz"
          echo "$VHS_SHA256  $RUNNER_TEMP/vhs.tar.gz" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/vhs.tar.gz" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/vhs_0.11.0_Linux_x86_64/vhs" "$RUNNER_TEMP/render-bin/vhs"

          curl --fail --location --silent --show-error \
            https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 \
            --output "$RUNNER_TEMP/render-bin/ttyd"
          echo "$TTYD_SHA256  $RUNNER_TEMP/render-bin/ttyd" | sha256sum --check
          chmod +x "$RUNNER_TEMP/render-bin/vhs" "$RUNNER_TEMP/render-bin/ttyd"
          echo "$RUNNER_TEMP/render-bin" >> "$GITHUB_PATH"

      - name: Verify demo comparison policy
        run: node --test test/demo-visual-comparison.test.mjs

      - name: Preserve the committed demo for visual comparison
        run: cp assets/demo.gif "$RUNNER_TEMP/committed-demo.gif"

      - name: Preserve the committed before/after export
        run: cp assets/before-after.png "$RUNNER_TEMP/committed-before-after.png"

      - name: Preserve the committed Product Hunt exports
        run: |
          mkdir -p "$RUNNER_TEMP/product-hunt"
          cp assets/product-hunt-thumbnail.png "$RUNNER_TEMP/product-hunt/"
          cp assets/product-hunt-01-before-after.png "$RUNNER_TEMP/product-hunt/"
          cp assets/product-hunt-02-setup.png "$RUNNER_TEMP/product-hunt/"
          cp assets/product-hunt-03-advisory.png "$RUNNER_TEMP/product-hunt/"
          cp assets/product-hunt-04-safe-fix.png "$RUNNER_TEMP/product-hunt/"

      - name: Render assets/before-after.png from assets/before-after.svg
        run: >-
          ffmpeg -nostdin -hide_banner -loglevel error
          -f svg_pipe -i assets/before-after.svg
          -frames:v 1 -y assets/before-after.png

      - name: Render Product Hunt media pack
        run: |
          set -euo pipefail
          ffmpeg -nostdin -hide_banner -loglevel error \
            -f svg_pipe -i assets/product-hunt-thumbnail.svg \
            -frames:v 1 -y assets/product-hunt-thumbnail.png
          ffmpeg -nostdin -hide_banner -loglevel error \
            -f svg_pipe -i assets/before-after.svg \
            -vf pad=1270:760:35:42:color=0x060a18 \
            -frames:v 1 -y assets/product-hunt-01-before-after.png
          ffmpeg -nostdin -hide_banner -loglevel error \
            -f svg_pipe -i assets/product-hunt-02-setup.svg \
            -frames:v 1 -y assets/product-hunt-02-setup.png
          ffmpeg -nostdin -hide_banner -loglevel error \
            -f svg_pipe -i assets/product-hunt-03-advisory.svg \
            -frames:v 1 -y assets/product-hunt-03-advisory.png
          ffmpeg -nostdin -hide_banner -loglevel error \
            -f svg_pipe -i assets/product-hunt-04-safe-fix.svg \
            -frames:v 1 -y assets/product-hunt-04-safe-fix.png

      - name: Render assets/demo.gif from promo/demo.tape
        run: vhs promo/demo.tape

      - name: Upload rendered demo
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-demo
          path: assets/demo.gif
          if-no-files-found: error
          retention-days: 7

      - name: Upload rendered before/after asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-before-after
          path: assets/before-after.png
          if-no-files-found: error
          retention-days: 7

      - name: Upload rendered Product Hunt media pack
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-product-hunt-media
          path: |
            assets/product-hunt-thumbnail.png
            assets/product-hunt-01-before-after.png
            assets/product-hunt-02-setup.png
            assets/product-hunt-03-advisory.png
            assets/product-hunt-04-safe-fix.png
          if-no-files-found: error
          retention-days: 7

      - name: Verify rendered before/after asset matches committed export
        run: |
          if ! cmp --silent \
            "$RUNNER_TEMP/committed-before-after.png" \
            assets/before-after.png; then
            echo "assets/before-after.png is stale; regenerate it from assets/before-after.svg." >&2
            exit 1
          fi
          echo "Rendered before/after PNG exactly matches the committed export."

      - name: Verify rendered Product Hunt assets match committed exports
        run: |
          set -euo pipefail
          for asset in \
            product-hunt-thumbnail.png \
            product-hunt-01-before-after.png \
            product-hunt-02-setup.png \
            product-hunt-03-advisory.png \
            product-hunt-04-safe-fix.png; do
            if ! cmp --silent \
              "$RUNNER_TEMP/product-hunt/$asset" \
              "assets/$asset"; then
              echo "assets/$asset is stale; regenerate the Product Hunt media pack." >&2
              exit 1
            fi
          done
          echo "Rendered Product Hunt PNGs exactly match the committed exports."

      - name: Verify rendered demo dimensions and timing
        env:
          MAX_FRAME_COUNT_DRIFT: "2"
          MAX_DURATION_DRIFT_SECONDS: "0.10"
        run: |
          set -euo pipefail
          node - "$RUNNER_TEMP/committed-demo.gif" assets/demo.gif <<'NODE'
          const { execFileSync } = require("node:child_process");

          const [committedPath, renderedPath] = process.argv.slice(2);
          const frameTolerance = Number(process.env.MAX_FRAME_COUNT_DRIFT);
          const tolerance = Number(process.env.MAX_DURATION_DRIFT_SECONDS);

          if (!Number.isInteger(frameTolerance) || frameTolerance < 0) {
            throw new Error("MAX_FRAME_COUNT_DRIFT must be a non-negative integer.");
          }
          if (!Number.isFinite(tolerance) || tolerance < 0) {
            throw new Error("MAX_DURATION_DRIFT_SECONDS must be non-negative.");
          }

          function probe(file) {
            const raw = execFileSync(
              "ffprobe",
              [
                "-v",
                "error",
                "-count_frames",
                "-select_streams",
                "v:0",
                "-show_entries",
                "stream=width,height,nb_read_frames,duration:format=duration",
                "-of",
                "json",
                file,
              ],
              { encoding: "utf8" },
            );
            const data = JSON.parse(raw);
            const stream = data.streams?.[0] ?? {};
            const streamDuration = Number(stream.duration);
            const formatDuration = Number(data.format?.duration);
            const metrics = {
              width: Number(stream.width),
              height: Number(stream.height),
              frames: Number(stream.nb_read_frames),
              duration: Number.isFinite(streamDuration)
                ? streamDuration
                : formatDuration,
            };

            if (
              !Number.isInteger(metrics.width) ||
              metrics.width <= 0 ||
              !Number.isInteger(metrics.height) ||
              metrics.height <= 0 ||
              !Number.isInteger(metrics.frames) ||
              metrics.frames <= 0 ||
              !Number.isFinite(metrics.duration) ||
              metrics.duration <= 0
            ) {
              throw new Error(
                `ffprobe returned invalid GIF metrics for ${file}: ${JSON.stringify(metrics)}`,
              );
            }
            return metrics;
          }

          const committed = probe(committedPath);
          const rendered = probe(renderedPath);
          const failures = [];

          if (
            rendered.width !== committed.width ||
            rendered.height !== committed.height
          ) {
            failures.push(
              `dimensions differ (${committed.width}x${committed.height} committed, ${rendered.width}x${rendered.height} rendered)`,
            );
          }
          const frameDrift = Math.abs(rendered.frames - committed.frames);
          if (frameDrift > frameTolerance) {
            failures.push(
              `frame-count drift ${frameDrift} exceeds ${frameTolerance} (${committed.frames} committed, ${rendered.frames} rendered)`,
            );
          }

          const durationDrift = Math.abs(rendered.duration - committed.duration);
          if (durationDrift > tolerance) {
            failures.push(
              `duration drift ${durationDrift.toFixed(6)}s exceeds ${tolerance.toFixed(6)}s (${committed.duration.toFixed(6)}s committed, ${rendered.duration.toFixed(6)}s rendered)`,
            );
          }

          if (failures.length > 0) {
            console.error(`Rendered demo metadata mismatch: ${failures.join("; ")}.`);
            process.exit(1);
          }

          console.log(
            `Rendered demo metadata matches: ${rendered.width}x${rendered.height}, ${rendered.frames} frames, ${rendered.duration.toFixed(6)}s.`,
          );
          NODE

      - name: Verify rendered demo matches committed visuals
        env:
          # Keep the visual threshold strict while allowing only the same
          # two-frame drift bounded independently by the metadata gate above.
          MINIMUM_SSIM: "0.997"
          MAX_TEMPORAL_SHIFT_FRAMES: "2"
        run: >-
          node tools/compare-demo-gifs.mjs
          "$RUNNER_TEMP/committed-demo.gif"
          assets/demo.gif
