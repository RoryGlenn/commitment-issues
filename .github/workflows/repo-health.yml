name: Repository Health

on:
  schedule:
    # Run weekly on Mondays at 9 AM New York time during daylight saving time.
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    name: Weekly repository health
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      COMMITMENT_ISSUES: 0

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: npm lifecycle integration
        run: npm run test:lifecycle:npm

      - name: Security advisory gate
        run: npm audit --audit-level=high

      - name: Stale branch report
        shell: bash
        run: |
          set -euo pipefail

          echo "Branches with no commits in the last 90 days:"
          echo

          cutoff_epoch=$(date -u -d "90 days ago" +%s)
          found=0

          while IFS='|' read -r refname commit_epoch; do
            branch=${refname#origin/}

            case "$branch" in
              HEAD|main)
                continue
                ;;
            esac

            if [[ "$commit_epoch" -lt "$cutoff_epoch" ]]; then
              found=1
              commit_date=$(date -u -d "@$commit_epoch" +%Y-%m-%d)
              echo "- $branch last changed on $commit_date"
            fi
          done < <(git for-each-ref --format='%(refname:short)|%(committerdate:unix)' refs/remotes/origin)

          if [[ "$found" -eq 0 ]]; then
            echo "No stale branches found."
          fi

          echo
          echo "This job only reports stale branches. It does not delete anything."

  migration-lifecycle:
    name: Weekly ${{ matrix.pm }} migration lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        pm: [pnpm, yarn, bun]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - run: npm ci

      - name: pnpm migration lifecycle
        if: matrix.pm == 'pnpm'
        run: node tools/run-migration-lifecycle-test.mjs pnpm

      - name: Yarn migration lifecycle
        if: matrix.pm == 'yarn'
        run: npm run test:migration:yarn

      - name: Bun migration lifecycle
        if: matrix.pm == 'bun'
        run: node tools/run-migration-lifecycle-test.mjs bun
